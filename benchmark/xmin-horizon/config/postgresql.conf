# PG17 config tuned for queue workloads with aggressive autovacuum.
# The point: even with very aggressive settings, VACUUM cannot reclaim
# dead tuples while xmin horizon is held by a long-running transaction
# or an unconsumed logical replication slot.

listen_addresses = '*'
shared_buffers = '512MB'
work_mem = '32MB'
maintenance_work_mem = '128MB'
effective_cache_size = '2GB'
max_wal_size = '2GB'
checkpoint_completion_target = 0.9

wal_level = logical
max_replication_slots = 10
max_wal_senders = 10

# Aggressive autovacuum.
autovacuum = on
autovacuum_naptime = 10s
autovacuum_vacuum_scale_factor = 0.005
autovacuum_vacuum_threshold = 50
autovacuum_analyze_scale_factor = 0.005
autovacuum_analyze_threshold = 50
autovacuum_vacuum_cost_limit = 10000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_max_workers = 6
log_autovacuum_min_duration = 0

# Logging useful for the benchmark.
log_min_duration_statement = -1
log_line_prefix = '%t [%p] %d '
log_lock_waits = on
track_io_timing = on
