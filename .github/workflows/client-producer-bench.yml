name: Client producer benchmarks

on:
  push:
    branches:
      - bench-client-producer-rc3
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost:5432/pgque_test
      PGPASSWORD: pgque_test
      PGQUE_BENCH_REPEATS: "3"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-bench \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18
          for _ in $(seq 1 30); do
            if psql "$PGQUE_TEST_DSN" -c 'select 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs pgque-bench
          exit 1

      - name: Install PgQue SQL
        run: |
          set -Eeuo pipefail
          bash build/transform.sh
          psql "$PGQUE_TEST_DSN" -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python producer benchmark
        run: |
          set -Eeuo pipefail
          python -m pip install -e clients/python
          python clients/python/bench_producer.py | tee python-bench.md

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: clients/go/go.mod
          cache-dependency-path: clients/go/go.sum

      - name: Run Go producer benchmark
        run: |
          set -Eeuo pipefail
          cd clients/go
          PGQUE_RUN_PRODUCER_BENCH=1 go test -run TestProducerBenchmarks -count=1 -v | tee ../../go-bench.txt

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.8

      - name: Run TypeScript producer benchmark
        run: |
          set -Eeuo pipefail
          cd clients/typescript
          bun install --frozen-lockfile
          bun run build
          bun src/producer_bench.ts | tee ../../typescript-bench.md

      - name: Collect CSV
        run: |
          set -Eeuo pipefail
          {
            echo 'language,method,batch_size,median_ms,events_per_sec,repeats'
            awk '/^python,/{print}' python-bench.md
            awk '/csv:go,/{sub(/^.*csv:/,""); print}' go-bench.txt
            awk '/^typescript,/{print}' typescript-bench.md
          } | tee client-producer-bench.csv

      - name: Publish summary
        run: |
          set -Eeuo pipefail
          {
            echo '## Client producer benchmark'
            echo
            echo 'Environment: GitHub Actions `ubuntu-latest`, PostgreSQL 18 Docker image, single sequential producer, one DB connection/client, median of 3 repeats.'
            echo
            echo '```csv'
            cat client-producer-bench.csv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: client-producer-bench
          path: |
            client-producer-bench.csv
            python-bench.md
            go-bench.txt
            typescript-bench.md
