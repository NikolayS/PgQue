name: Release Ruby client

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching clients/ruby/lib/pgque/version.rb"
        required: true
        type: string
      dry_run:
        description: "Build and validate without tagging or publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-ruby-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main' || inputs.dry_run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
        env:
          POSTGRES_PASSWORD: pgque_test
          POSTGRES_DB: pgque_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username=postgres --dbname=pgque_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      VERSION: ${{ inputs.version }}
      TAG_NAME: ruby/v${{ inputs.version }}
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost:5432/pgque_test
    defaults:
      run:
        working-directory: clients/ruby
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: clients/ruby
          bundler-cache: true

      - name: Verify clean release candidate
        run: |
          set -Eeuo pipefail
          git diff --exit-code
          git diff-index --quiet --cached HEAD
          ruby script/validate_release.rb "$VERSION" "$TAG_NAME"
          git check-ref-format "refs/tags/$TAG_NAME"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null; then
            echo "release tag $TAG_NAME already exists"
            exit 1
          else
            rc=$?
            if [ "$rc" -ne 2 ]; then
              echo "failed to check release tag $TAG_NAME"
              exit "$rc"
            fi
          fi

      - name: Verify RubyGems version is available
        run: |
          set -Eeuo pipefail
          response=$(mktemp)
          trap 'rm -f "$response"' EXIT
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            -H 'Accept: application/json' \
            https://rubygems.org/api/v1/versions/pgque.json \
            -o "$response"
          ruby script/check_rubygems_version.rb "$VERSION" "$response"

      - name: Build and install current PgQue SQL
        working-directory: ${{ github.workspace }}
        run: |
          set -Eeuo pipefail
          ready_checks=0
          for _attempt in $(seq 1 30); do
            if psql "$PGQUE_TEST_DSN" -v ON_ERROR_STOP=1 -c 'select 1' >/dev/null 2>&1; then
              ready_checks=$((ready_checks + 1))
              if [ "$ready_checks" -ge 2 ]; then
                break
              fi
            else
              ready_checks=0
            fi
            sleep 1
          done
          if [ "$ready_checks" -lt 2 ]; then
            echo "PostgreSQL did not remain ready for two consecutive checks"
            exit 1
          fi

          bash build/transform.sh
          if ! git diff --exit-code -- devel/sql/pgque.sql devel/sql/pgque-tle.sql; then
            echo "generated PgQue SQL is stale; run build/transform.sh and commit the result"
            exit 1
          fi
          psql "$PGQUE_TEST_DSN" -v ON_ERROR_STOP=1 -f devel/sql/pgque.sql

      - name: Run tests and build gem
        run: |
          set -Eeuo pipefail
          test_log=$(mktemp)
          trap 'rm -f "$test_log"' EXIT
          bundle exec rake test 2>&1 | tee "$test_log"
          ruby script/assert_no_test_skips.rb "$test_log"
          gem build pgque.gemspec
          ruby script/validate_release.rb "$VERSION" "$TAG_NAME" "./pgque-${VERSION}.gem"

      - name: Verify built gem installs
        run: |
          set -Eeuo pipefail
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          gem install --install-dir "$tmp" --no-document "./pgque-${VERSION}.gem"
          GEM_PATH="$tmp" GEM_HOME="$tmp" ruby -e '
            require "pgque"
            expected = ENV.fetch("VERSION")
            raise "version mismatch: expected #{expected}, got #{Pgque::VERSION}" \
              unless Pgque::VERSION == expected
            raise "Pgque::Client missing"   unless defined?(Pgque::Client)
            raise "Pgque::Consumer missing" unless defined?(Pgque::Consumer)
            puts "install verified: pgque #{Pgque::VERSION}"
          '

      - name: Upload validated gem
        uses: actions/upload-artifact@v4
        with:
          name: ruby-gem-${{ inputs.version }}
          path: clients/ruby/pgque-${{ inputs.version }}.gem
          if-no-files-found: error
          retention-days: 1

      - name: Show dry-run result
        if: inputs.dry_run
        run: |
          set -Eeuo pipefail
          echo "dry run complete: validated pgque ${VERSION}"
          echo "real publish would create ${TAG_NAME} at ${GITHUB_SHA} and push the validated gem"

  publish-rubygems:
    if: ${{ !inputs.dry_run }}
    needs: build
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ inputs.version }}
      TAG_NAME: ruby/v${{ inputs.version }}
    defaults:
      run:
        working-directory: clients/ruby
    steps:
      # Tag exactly the SHA validated by the build job. An explicit tag push
      # works from detached HEAD and cannot race with a later main revision.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: clients/ruby

      - uses: actions/download-artifact@v4
        with:
          name: ruby-gem-${{ inputs.version }}
          path: clients/ruby

      - name: Revalidate artifact and tag
        run: |
          set -Eeuo pipefail
          git diff --exit-code
          git diff-index --quiet --cached HEAD
          ruby script/validate_release.rb "$VERSION" "$TAG_NAME" "./pgque-${VERSION}.gem"
          git check-ref-format "refs/tags/$TAG_NAME"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null; then
            echo "release tag $TAG_NAME already exists"
            exit 1
          else
            rc=$?
            if [ "$rc" -ne 2 ]; then
              echo "failed to check release tag $TAG_NAME"
              exit "$rc"
            fi
          fi

      - name: Recheck RubyGems version availability
        run: |
          set -Eeuo pipefail
          response=$(mktemp)
          trap 'rm -f "$response"' EXIT
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            -H 'Accept: application/json' \
            https://rubygems.org/api/v1/versions/pgque.json \
            -o "$response"
          ruby script/check_rubygems_version.rb "$VERSION" "$response"

      - name: Configure RubyGems trusted-publishing credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Create namespaced Ruby release tag
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Ruby client ${VERSION}"
          git push origin "refs/tags/$TAG_NAME"

      - name: Publish validated gem to RubyGems
        run: gem push "./pgque-${VERSION}.gem"

      - name: Wait for release to propagate
        run: gem exec rubygems-await "./pgque-${VERSION}.gem"
